services:
  camera:
    build: .
    container_name: camera-mosaic
    restart: unless-stopped
    ports:
      - "3010:3000"
    volumes:
      - camera_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      # Set SESSION_SECRET in .env file or environment variable
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}

volumes:
  camera_data:
