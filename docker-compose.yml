services:
  camera:
    build: .
    container_name: camera-mosaic
    restart: unless-stopped
    ports:
      - "${HOST_PORT:-3010}:3000"
    volumes:
      - camera_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      # SESSION_SECRET: set in .env (generated by install.sh)
      # If not set, auto-generated and saved to data/session.secret on first run
      - SESSION_SECRET=${SESSION_SECRET:-}
      # COOKIE_SECURE: false (HTTP), auto (HTTPS via proxy), true (direct HTTPS)
      - COOKIE_SECURE=${COOKIE_SECURE:-auto}

volumes:
  camera_data:
